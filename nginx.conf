server {
    listen 80;
    server_name localhost;

    # Root directory where your static files live
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Handle German language paths
    location /de/ {
        try_files $uri $uri/ @de_404;
    }

    # Handle all other paths (Default/English)
    location / {
        try_files $uri $uri/ =404;
    }

    # Standard global 404 handler (falls back to English)
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Custom internal location to route German 404s
    location @de_404 {
        rewrite ^ /de/404.html break;
    }
}